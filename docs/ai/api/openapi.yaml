      responses:
        "200":
          description: Список типов документов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Documents
      summary: Загрузить новый документ
      description: |
        **Доступ:** участник проекта (право `document:create`).
        Принимает multipart (файл + тип) или JSON (только тип, для создания пустого документа).
      security:
        - BearerAuth: []
      operationId: createDocument
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type:
                  type: string
                file:
                  type: string
                  format: binary
              required:
                - type
                - file
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentCreateRequest"
      responses:
        "201":
          description: Документ создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

