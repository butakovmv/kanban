  # =================== SSE Realtime ===================
  /projects/{projectId}/events:
    get:
      tags:
        - Realtime
      summary: SSE-поток событий доски
      description: |
        **Доступ:** участник проекта (право `task:read`).
        Устанавливает SSE-соединение. Сервер отправляет события в формате `text/event-stream`.

        **Типы событий:**
        - `task_moved`, `task_updated`, `task_created`, `task_archived`
        - `column_created`, `column_updated`, `column_deleted`, `column_reordered`
        - `comment_added`, `comment_deleted`

        **Переподключение:** браузер отправляет `Last-Event-ID`, сервер восполняет пропущенные события из буфера.
        При разрыве > 30 сек клиент перезагружает доску через `GET /board`.
      security:
        - BearerAuth: []
      operationId: subscribeToEvents
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: Last-Event-ID
          in: header
          schema:
            type: string
            maxLength: 100
          description: ID последнего полученного события
      responses:
        "200":
          description: |
            SSE-поток. `Content-Type: text/event-stream`.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: task_moved
                  data: {"type":"TASK_MOVED","payload":{"taskId":"uuid","fromColumnId":"uuid","toColumnId":"uuid","position":0},"userId":"uuid","timestamp":"2026-06-19T12:00:00Z"}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

parameters:
  projectId:
    name: projectId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  columnId:
    name: columnId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  taskId:
    name: taskId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  commentId:
    name: commentId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  fileId:
    name: fileId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  documentId:
    name: documentId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  groupId:
    name: groupId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  offset:
    name: offset
    in: query
    schema:
      type: integer
      minimum: 0
      default: 0
  limit:
    name: limit
    in: query
    schema:
      type: integer
      minimum: 1
      maximum: 100
      default: 50
