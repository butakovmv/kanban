name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Test with coverage
        run: npx vitest run --coverage --reporter=verbose --reporter=junit --outputFile=junit-report.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        continue-on-error: true
        with:
          name: Frontend Tests
          path: vue/junit-report.xml
          reporter: java-junit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: frontend-coverage
          path: vue/coverage/

      - name: Build
        run: npm run build
        if: success() || failure()

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck
        continue-on-error: true

      - name: Lint (detekt)
        run: ./gradlew detekt
        continue-on-error: true

      - name: Test
        run: ./gradlew test jacocoTestReport

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        continue-on-error: true
        with:
          name: Backend Tests
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: backend-coverage
          path: '**/build/reports/jacoco/'

      - name: Build
        run: ./gradlew :spring:bootJar
        if: success() || failure()
