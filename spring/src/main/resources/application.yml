server:
  port: 8080

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kanban}
    username: ${DB_USER:kanban}
    password: ${DB_PASSWORD:kanban}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

kanban:
  jwt:
    secret: ${JWT_SECRET:dev-secret-32-chars-min!!}
    access-expiration: 3600
    refresh-expiration: 2592000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: kanban
  nats:
    enabled: false

springdoc:
  api-docs:
    path: /api/contract.yaml
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
    com.kanban.postgres: TRACE
    ch.qos.logback: WARN
